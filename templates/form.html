<!DOCTYPE html>
<html>
<head>
    <title>Escolha de Professores</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>Escolha a posição de cada professor</h2>

    {% if sucesso %}
        <div class="sucesso">Resposta enviada com sucesso!</div>
    {% endif %}

    <form method="POST">
        <label>Nome</label>
        <input type="text" name="nome" required>

        <label>Série</label>
        <input type="text" name="serie" required>

        <hr>

        {% for prof in ["Eloize","Diego","Graziane","Jeanete","Jessica","Priscila","Rodrigo"] %}
            <label>{{ prof }}</label>
            <select name="{{ prof }}" required>
                <option value="">Selecione</option>
                {% for i in range(1,8) %}
                    <option value="{{ i }}">{{ i }}º</option>
                {% endfor %}
            </select>
        {% endfor %}

        <button type="submit">Enviar</button>
    </form>
</div>
</body>
</html>
